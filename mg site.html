<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG Architekci</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React i ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel (do kompilacji JSX w przeglądarce) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Ikonki z Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Proste style globalne dla płynnego scrollowania */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Komponenty ikonek (proste wrappery SVG dla kompatybilności)
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        root: iconRef.current.parentNode
                    });
                }
            }, [name]);
            return <i data-lucide={name} className={className} ref={iconRef}></i>;
        };

        const ArrowUpRight = ({ className }) => <Icon name="ArrowUpRight" className={className} />;
        const Menu = ({ className }) => <Icon name="Menu" className={className} />;
        const X = ({ className }) => <Icon name="X" className={className} />;
        const MapPin = ({ className }) => <Icon name="MapPin" className={className} />;
        const Phone = ({ className }) => <Icon name="Phone" className={className} />;
        const Mail = ({ className }) => <Icon name="Mail" className={className} />;
        const Instagram = ({ className }) => <Icon name="Instagram" className={className} />;
        const Facebook = ({ className }) => <Icon name="Facebook" className={className} />;
        const Linkedin = ({ className }) => <Icon name="Linkedin" className={className} />;

        // --- Komponenty Pomocnicze ---
        const ButtonLink = ({ children, href = "#", dark = false }) => {
            return (
                <a 
                    href={href}
                    className={`group inline-flex items-center gap-3 text-sm font-medium uppercase tracking-widest transition-all duration-300
                        ${dark ? 'text-white border-white hover:text-gray-300 hover:border-gray-300' : 'text-zinc-900 border-zinc-900 hover:text-zinc-500 hover:border-zinc-500'}
                        border-b pb-1`}
                >
                    {children}
                    <ArrowUpRight className="w-4 h-4 transition-transform duration-300 group-hover:translate-x-1 group-hover:-translate-y-1" />
                </a>
            );
        };

        const FadeIn = ({ children, delay = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const domRef = useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => setIsVisible(entry.isIntersecting));
                }, { threshold: 0.1 });
                
                const currentRef = domRef.current;
                if (currentRef) observer.observe(currentRef);
                return () => { if (currentRef) observer.unobserve(currentRef); };
            }, []);

            return (
                <div
                    ref={domRef}
                    className={`transition-all duration-1000 ease-out ${
                        isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'
                    }`}
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        // --- Główna Aplikacja ---
        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                // Inicjalizacja ikon po zamontowaniu komponentu
                if(window.lucide) window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { name: 'O nas', href: '#o-nas' },
                { name: 'Projekty', href: '#projekty' },
                { name: 'Ekspertyza', href: '#ekspertyza' },
                { name: 'Kontakt', href: '#kontakt' },
            ];

            const projects = [
                {
                    id: 1,
                    title: 'Rezydencja Las',
                    category: 'Architektura Prywatna',
                    image: 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&q=80&w=2000',
                    span: 'col-span-1 md:col-span-2 row-span-2'
                },
                {
                    id: 2,
                    title: 'Biurowiec Nova',
                    category: 'Obiekty Komercyjne',
                    image: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=1000',
                    span: 'col-span-1'
                },
                {
                    id: 3,
                    title: 'Apartament 04',
                    category: 'Wnętrza',
                    image: 'https://images.unsplash.com/photo-1600607687920-4e2a09be15c7?auto=format&fit=crop&q=80&w=1000',
                    span: 'col-span-1'
                },
                {
                    id: 4,
                    title: 'Pawilon Sztuki',
                    category: 'Użyteczność Publiczna',
                    image: 'https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=2000',
                    span: 'col-span-1 md:col-span-2'
                }
            ];

            return (
                <div className="selection:bg-zinc-900 selection:text-white">
                    {/* Nawigacja */}
                    {/*tutaj zmiana grubosci paska na scroll bg-white/90 py-1 grubosc */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white/90 backdrop-blur-md py-1.5 shadow-sm' : 'bg-transparent py-6 md:py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <a href="#" className="relative z-50 flex items-center gap-3">
                                <img 
                                    src="Gemini_Generated_Image_5s98h55s98h55s98.png" 
                                    alt="JABADABA DUUU" 
                                    className={`transition-all duration-300 object-contain ${isScrolled ? 'h-10' : 'h-12 md:h-14'} ${!isScrolled && isMobileMenuOpen ? 'invert' : ''}`}
                                    onError={(e) => {
                                        e.target.onerror = null; 
                                        e.target.style.display = 'none';
                                        e.target.nextElementSibling.style.display = 'block';
                                    }}
                                /> 
                                <img src="mg_logo.png" alt="" width="100px" height="100px"/>
                            </a>

                            <div className="hidden md:flex items-center gap-10">
                                {navLinks.map((link) => (
                                    <a key={link.name} href={link.href} className="text-sm font-medium uppercase tracking-widest hover:text-zinc-500 transition-colors relative group">
                                        {link.name}
                                        <span className="absolute -bottom-1 left-0 w-0 h-[1px] bg-zinc-900 transition-all duration-300 group-hover:w-full"></span>
                                    </a>
                                ))}
                            </div>

                            <button className="md:hidden relative z-50 p-2" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                                {isMobileMenuOpen ? <X className="w-6 h-6 text-zinc-900" /> : <Menu className={`w-6 h-6 ${isScrolled ? 'text-zinc-900' : 'text-zinc-900'}`} />}
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Menu Overlay */}
                    <div className={`fixed inset-0 bg-white z-40 transition-transform duration-500 ease-in-out ${isMobileMenuOpen ? 'translate-y-0' : '-translate-y-full'} md:hidden flex flex-col justify-center items-center`}>
                        <div className="flex flex-col gap-8 text-center">
                            {navLinks.map((link, index) => (
                                <a key={link.name} href={link.href} onClick={() => setIsMobileMenuOpen(false)} className="text-3xl font-light tracking-tight hover:text-zinc-500 transition-colors" style={{ transitionDelay: `${index * 100}ms` }}>
                                    {link.name}
                                </a>
                            ))}
                        </div>
                    </div>

                    {/* Hero Section */}
                    <header className="relative h-screen w-full flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 w-full h-full">
                            <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80&w=2000" alt="Nowoczesna architektura" className="object-cover w-full h-full" />
                            <div className="absolute inset-0 bg-gradient-to-r from-white/90 via-white/70 to-transparent"></div>
                        </div>

                        <div className="relative z-10 max-w-7xl w-full mx-auto px-6 md:px-12 mt-20">
                            <FadeIn><p className="text-sm md:text-base font-semibold uppercase tracking-[0.3em] mb-6 text-zinc-600">Architektura</p></FadeIn>
                            <FadeIn delay={200}>
                                <h1 className="text-5xl md:text-7xl lg:text-8xl font-light tracking-tighter leading-[1.1] mb-8 max-w-4xl">
                                    Projektujemy <br/><span className="font-semibold">Przyszłość.</span>
                                </h1>
                            </FadeIn>
                            <FadeIn delay={400}>
                                <p className="text-lg md:text-xl text-zinc-700 max-w-xl mb-12 font-light leading-relaxed">
                                    Tworzymy ponadczasowe przestrzenie, które łączą rygorystyczną funkcjonalność z minimalistyczną elegancją.
                                </p>
                            </FadeIn>
                            <FadeIn delay={600}>
                                <ButtonLink href="#projekty">Zobacz nasze portfolio</ButtonLink>
                            </FadeIn>
                        </div>
                    </header>

                    {/* O Nas */}
                    <section id="o-nas" className="py-24 md:py-40 bg-white">
                        <div className="max-w-7xl mx-auto px-6 md:px-12">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 lg:gap-24 items-center">
                                <FadeIn>
                                    <h2 className="text-3xl md:text-5xl font-light tracking-tight leading-tight">
                                        Naszą pasją jest kształtowanie otoczenia. Wierzymy, że dobra architektura <span className="font-semibold italic">poprawia jakość życia.</span>
                                    </h2>
                                </FadeIn>
                                <FadeIn delay={200}>
                                    <div className="flex flex-col gap-6 text-zinc-600 font-light text-lg">
                                        <p>Biuro MG Architekci powstało z chęci tworzenia obiektów bezkompromisowych. Nie podążamy ślepo za trendami – szukamy rozwiązań, które przetrwają próbę czasu.</p>
                                        <p>Każdy projekt traktujemy indywidualnie, analizując kontekst miejsca, potrzeby inwestora oraz optymalne rozwiązania technologiczne. Od koncepcji aż po nadzór autorski.</p>
                                        <div className="mt-6"><ButtonLink href="#kontakt">Porozmawiajmy o wizji</ButtonLink></div>
                                    </div>
                                </FadeIn>
                            </div>
                        </div>
                    </section>

                    {/* Projekty */}
                    <section id="projekty" className="py-24 md:py-32 bg-zinc-50">
                        <div className="max-w-7xl mx-auto px-6 md:px-12">
                            <FadeIn>
                                <div className="flex flex-col md:flex-row md:justify-between md:items-end mb-16 gap-6">
                                    <div>
                                        <span className="text-xs font-bold uppercase tracking-[0.2em] text-zinc-400 mb-2 block">Portfolio</span>
                                        <h2 className="text-4xl md:text-5xl font-light tracking-tight">Wybrane Realizacje</h2>
                                    </div>
                                    <ButtonLink href="#wszystkie">Pełne archiwum</ButtonLink>
                                </div>
                            </FadeIn>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 auto-rows-[400px]">
                                {projects.map((project, index) => (
                                    <FadeIn key={project.id} delay={index * 150} className={project.span}>
                                        <a href={`#projekt-${project.id}`} className="group block w-full h-full relative overflow-hidden bg-zinc-200">
                                            <img src={project.image} alt={project.title} className="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-105" />
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex flex-col justify-end p-8 md:p-12">
                                                <span className="text-zinc-300 text-xs font-semibold uppercase tracking-[0.2em] mb-2 transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500">{project.category}</span>
                                                <h3 className="text-white text-2xl md:text-3xl font-medium tracking-tight transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500 delay-75">{project.title}</h3>
                                            </div>
                                        </a>
                                    </FadeIn>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Ekspertyza */}
                    <section id="ekspertyza" className="py-24 md:py-40 bg-zinc-950 text-white">
                        <div className="max-w-7xl mx-auto px-6 md:px-12">
                            <FadeIn>
                                <div className="mb-20">
                                    <span className="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500 mb-2 block">Usługi</span>
                                    <h2 className="text-4xl md:text-5xl font-light tracking-tight">Nasza Ekspertyza</h2>
                                </div>
                            </FadeIn>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12 md:gap-8 border-t border-zinc-800 pt-16">
                                {[
                                    { title: "Architektura Kubaturowa", desc: "Kompleksowe projekty budynków mieszkalnych, biurowych i użyteczności publicznej. Od analizy chłonności po pozwolenie na budowę." },
                                    { title: "Projektowanie Wnętrz", desc: "Tworzymy spójne, minimalistyczne wnętrza dopasowane do stylu życia użytkowników. Dbamy o każdy detal wykonawczy." },
                                    { title: "Nadzór & Doradztwo", desc: "Prowadzimy nadzory autorskie na budowie, dbając o zgodność realizacji z projektem. Doradzamy przy wyborze materiałów i wykonawców." }
                                ].map((service, index) => (
                                    <FadeIn key={index} delay={index * 200}>
                                        <div className="flex flex-col">
                                            <span className="text-zinc-600 text-sm font-mono mb-4">0{index + 1}</span>
                                            <h3 className="text-2xl font-medium mb-4">{service.title}</h3>
                                            <p className="text-zinc-400 font-light leading-relaxed">{service.desc}</p>
                                        </div>
                                    </FadeIn>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Kontakt */}
                    <section id="kontakt" className="py-24 md:py-40 bg-white">
                        <div className="max-w-7xl mx-auto px-6 md:px-12 grid grid-cols-1 lg:grid-cols-2 gap-16">
                            <div>
                                <FadeIn>
                                    <h2 className="text-4xl md:text-6xl font-light tracking-tight mb-8">Zacznijmy <br/> <span className="font-semibold">rozmowę.</span></h2>
                                    <p className="text-lg text-zinc-600 font-light mb-12 max-w-md">Jesteś zainteresowany współpracą? Skontaktuj się z nami, aby omówić szczegóły Twojego przyszłego projektu.</p>
                                </FadeIn>
                                
                                <FadeIn delay={200}>
                                    <div className="space-y-6">
                                        <a href="mailto:hello@mgarchitekci.pl" className="flex items-center gap-4 group">
                                            <div className="w-12 h-12 rounded-full border border-zinc-200 flex items-center justify-center group-hover:border-zinc-900 group-hover:bg-zinc-900 group-hover:text-white transition-all duration-300">
                                                <Mail className="w-5 h-5" />
                                            </div>
                                            <span className="text-lg font-light group-hover:font-medium transition-all">hello@mgarchitekci.pl</span>
                                        </a>
                                        <a href="tel:+48123456789" className="flex items-center gap-4 group">
                                            <div className="w-12 h-12 rounded-full border border-zinc-200 flex items-center justify-center group-hover:border-zinc-900 group-hover:bg-zinc-900 group-hover:text-white transition-all duration-300">
                                                <Phone className="w-5 h-5" />
                                            </div>
                                            <span className="text-lg font-light group-hover:font-medium transition-all">+48 123 456 789</span>
                                        </a>
                                        <div className="flex items-center gap-4 group">
                                            <div className="w-12 h-12 rounded-full border border-zinc-200 flex items-center justify-center group-hover:border-zinc-900 group-hover:bg-zinc-900 group-hover:text-white transition-all duration-300">
                                                <MapPin className="w-5 h-5" />
                                            </div>
                                            <span className="text-lg font-light group-hover:font-medium transition-all">ul. Architektów 14/2<br/>00-001 Warszawa</span>
                                        </div>
                                    </div>
                                </FadeIn>
                            </div>

                            <FadeIn delay={400}>
                                <form className="bg-zinc-50 p-8 md:p-12" onSubmit={(e) => e.preventDefault()}>
                                    <h3 className="text-2xl font-medium mb-8">Napisz do nas</h3>
                                    <div className="space-y-8">
                                        <div className="relative">
                                            <input type="text" id="name" className="block w-full border-0 border-b border-zinc-300 bg-transparent py-3 text-zinc-900 placeholder-transparent focus:border-zinc-900 focus:ring-0 peer transition-colors" placeholder="Imię i nazwisko" required />
                                            <label htmlFor="name" className="absolute left-0 -top-3.5 text-xs text-zinc-500 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-zinc-400 peer-placeholder-shown:top-3 peer-focus:-top-3.5 peer-focus:text-xs peer-focus:text-zinc-900 uppercase tracking-wider">Imię i nazwisko</label>
                                        </div>
                                        <div className="relative">
                                            <input type="email" id="email" className="block w-full border-0 border-b border-zinc-300 bg-transparent py-3 text-zinc-900 placeholder-transparent focus:border-zinc-900 focus:ring-0 peer transition-colors" placeholder="Adres e-mail" required />
                                            <label htmlFor="email" className="absolute left-0 -top-3.5 text-xs text-zinc-500 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-zinc-400 peer-placeholder-shown:top-3 peer-focus:-top-3.5 peer-focus:text-xs peer-focus:text-zinc-900 uppercase tracking-wider">Adres E-mail</label>
                                        </div>
                                        <div className="relative">
                                            <textarea id="message" rows={4} className="block w-full border-0 border-b border-zinc-300 bg-transparent py-3 text-zinc-900 placeholder-transparent focus:border-zinc-900 focus:ring-0 peer transition-colors resize-none" placeholder="Wiadomość" required></textarea>
                                            <label htmlFor="message" className="absolute left-0 -top-3.5 text-xs text-zinc-500 transition-all peer-placeholder-shown:text-base peer-placeholder-shown:text-zinc-400 peer-placeholder-shown:top-3 peer-focus:-top-3.5 peer-focus:text-xs peer-focus:text-zinc-900 uppercase tracking-wider">O czym chciałbyś porozmawiać?</label>
                                        </div>
                                        <button type="submit" className="w-full bg-zinc-900 text-white py-4 text-sm font-semibold uppercase tracking-widest hover:bg-zinc-800 transition-colors flex justify-center items-center gap-2">
                                            Wyślij wiadomość <ArrowUpRight className="w-4 h-4" />
                                        </button>
                                    </div>
                                </form>
                            </FadeIn>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-zinc-950 text-zinc-400 py-12 border-t border-zinc-900">
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-3">
                                <img src="Gemini_Generated_Image_5s98h55s98h55s98.png" alt="MG Architekci" className="h-8 invert opacity-50 hover:opacity-100 transition-opacity" />
                                <span className="text-sm tracking-widest uppercase">© {new Date().getFullYear()} MG Architekci</span>
                            </div>
                            
                            <div className="flex gap-6">
                                <a href="#" className="hover:text-white transition-colors"><Instagram className="w-5 h-5" /></a>
                                <a href="#" className="hover:text-white transition-colors"><Facebook className="w-5 h-5" /></a>
                                <a href="#" className="hover:text-white transition-colors"><Linkedin className="w-5 h-5" /></a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        // Renderowanie aplikacji
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
